# Consumer integration test profile — real RabbitMQ (Testcontainers), real PostgreSQL (Testcontainers).
# MongoDB and Redis are excluded; their beans are replaced by @MockitoBean in the test class.

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration

spring.cache.type=none
management.health.defaults.enabled=false
management.health.redis.enabled=false
management.health.mongo.enabled=false
management.health.rabbit.enabled=false

jwt.secret=24966c8a763b3a3f7f264cefb93d95159184e8c5e2af5c94e05387371d47a3fd=
jwt.expiration=86400000

feign.user-service.url=http://localhost:9999
feign.booking-service.url=http://localhost:9999
feign.event-service.url=http://localhost:9999
feign.ticket-service.url=http://localhost:9999

# JPA — Testcontainer provides the real URL via @DynamicPropertySource
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# RabbitMQ — host/port/credentials are overridden by @DynamicPropertySource at runtime
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
