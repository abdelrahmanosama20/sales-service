apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: neo4j
  namespace: eventticketing

spec:
  serviceName: neo4j

  replicas: 1

  selector:
    matchLabels:
      app: neo4j

  template:
    metadata:
      labels:
        app: neo4j

    spec:
      containers:
        - name: neo4j

          image: neo4j:5

          ports:
            - containerPort: 7687
            - containerPort: 7474

          env:
            - name: NEO4J_AUTH
              value: neo4j/neo4jpass

          volumeMounts:
            - name: neo4j-storage
              mountPath: /data

      volumes:
        - name: neo4j-storage
          persistentVolumeClaim:
            claimName: neo4j-pvc