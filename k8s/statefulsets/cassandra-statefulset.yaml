apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: eventticketing
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1
          ports:
            - containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "eventticketing-cluster"
            - name: CASSANDRA_DC
              value: "datacenter1"
            - name: CASSANDRA_RACK
              value: "rack1"
            - name: MAX_HEAP_SIZE
              value: "256M"
            - name: HEAP_NEWSIZE
              value: "100M"
          volumeMounts:
            - name: cassandra-storage
              mountPath: /var/lib/cassandra
      volumes:
        - name: cassandra-storage
          persistentVolumeClaim:
            claimName: cassandra-pvc
