apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  # ── Provider config — tells Grafana to load JSON files from /etc/grafana/dashboards ──
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: "Event Ticketing"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards

  # ── S1: User Service Dashboard (owned by S1-INFRA) ──
  user-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["user-service", "eventticketing"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "User Service Dashboard",
      "uid": "user-service-dashboard",
      "version": 1,
      "panels": [
        {
          "id": 1,
          "title": "Error Rate (errors per minute)",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"user-service\", level=\"ERROR\"}[1m]))",
              "legendFormat": "errors/min",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "RabbitMQ Event Audit (user.registered / user.deactivated)",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{app=\"eventticketing\", service=\"user-service\"} |~ \"routingKey|user\\.registered|user\\.deactivated\"",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Feign Call Outcomes",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{app=\"eventticketing\", service=\"user-service\"} |~ \"Feign|FeignException\"",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "HTTP Request Rate (req/s per endpoint)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by(method, uri) (rate(http_server_requests_seconds_count{job=\"user-service\"}[5m]))",
              "legendFormat": "{{method}} {{uri}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "HTTP Latency Percentiles (P50 / P95 / P99)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m])))",
              "legendFormat": "P50 {{uri}}", "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m])))",
              "legendFormat": "P95 {{uri}}", "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m])))",
              "legendFormat": "P99 {{uri}}", "refId": "C"
            }
          ]
        },
        {
          "id": 6,
          "title": "JVM Heap Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_used_bytes{job=\"user-service\", area=\"heap\"}",
              "legendFormat": "heap used", "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_max_bytes{job=\"user-service\", area=\"heap\"}",
              "legendFormat": "heap max", "refId": "B"
            }
          ]
        }
      ]
    }

  # ── S3: Booking Service Dashboard (owned by S3-INFRA) ──
  booking-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["booking-service", "eventticketing"],
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "Booking Service Dashboard",
      "uid": "booking-service-dashboard",
      "version": 1,
      "panels": [
        {
          "id": 1,
          "title": "Error Rate",
          "description": "LogQL — ERROR-level log lines per minute from booking-service",
          "type": "logs",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"booking-service\", level=\"ERROR\"}[1m]))",
              "refId": "A", "legendFormat": "errors/min"
            }
          ]
        },
        {
          "id": 2,
          "title": "Saga State Transitions",
          "description": "LogQL — Every booking status transition logged by BookingService.",
          "type": "logs",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{app=\"eventticketing\", service=\"booking-service\"} |= \"transitioning\"",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Feign Call Outcomes",
          "description": "LogQL — Successful Feign calls vs failures.",
          "type": "logs",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"booking-service\"} |= \"returned successfully\" [5m]))",
              "refId": "A", "legendFormat": "feign success"
            },
            {
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"booking-service\"} |= \"Feign call to\" |= \"failed\" [5m]))",
              "refId": "B", "legendFormat": "feign failures"
            }
          ]
        },
        {
          "id": 4,
          "title": "HTTP Request Rate",
          "description": "PromQL — Requests per second per endpoint.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (uri) (rate(http_server_requests_seconds_count{job=\"booking-service\"}[5m]))",
              "refId": "A", "legendFormat": "{{uri}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Latency P50 / P95 / P99",
          "description": "PromQL — Latency percentiles per endpoint.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_server_requests_seconds_bucket{job=\"booking-service\"}[5m])))",
              "refId": "A", "legendFormat": "p99"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{job=\"booking-service\"}[5m])))",
              "refId": "B", "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(http_server_requests_seconds_bucket{job=\"booking-service\"}[5m])))",
              "refId": "C", "legendFormat": "p50"
            }
          ]
        },
        {
          "id": 6,
          "title": "JVM Heap Usage",
          "description": "PromQL — Heap used vs committed.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{job=\"booking-service\", area=\"heap\"}",
              "refId": "A", "legendFormat": "heap used"
            },
            {
              "expr": "jvm_memory_committed_bytes{job=\"booking-service\", area=\"heap\"}",
              "refId": "B", "legendFormat": "heap committed"
            }
          ]
        },
        {
          "id": 7,
          "title": "Saga Queue Processing Rate",
          "description": "PromQL — Rate of messages consumed from the saga-feedback queue.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(spring_rabbitmq_listener_seconds_count{queue=\"booking.saga-feedback\"}[5m])",
              "refId": "A", "legendFormat": "messages/sec"
            }
          ]
        }
      ]
    }

