  # ── S4: Ticket Service Dashboard (owned by S4-INFRA) ──
  ticket-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["ticket-service", "eventticketing"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Ticket Service Dashboard",
      "uid": "ticket-service-dashboard",
      "version": 1,
      "panels": [
        {
          "id": 1,
          "title": "Error Rate (errors per minute)",
          "description": "Count of ERROR-level log lines from ticket-service per minute. Spikes indicate scan failures, Feign errors, or Cassandra write issues.",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "red" },
              "custom": { "lineWidth": 1, "fillOpacity": 10 },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"ticket-service\", level=\"ERROR\"}[1m]))",
              "legendFormat": "errors/min",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "RabbitMQ Ticket Events (issued / cancelled / saga)",
          "description": "Log lines for ticket.issued, ticket.cancelled, ticket.status-changed published events and booking.placed / booking.cancelled consumed events.",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{app=\"eventticketing\", service=\"ticket-service\"} |~ \"ticket\\.issued|ticket\\.cancelled|ticket\\.status-changed|booking\\.placed|booking\\.cancelled\"",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Feign Call Outcomes",
          "description": "Log lines for Feign calls to booking-service and event-service. Detects downstream degradation affecting ticket issuance and nearby-event lookups.",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{app=\"eventticketing\", service=\"ticket-service\"} |~ \"Feign|FeignException\"",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "HTTP Request Rate (req/s per endpoint)",
          "description": "Requests per second to ticket-service endpoints grouped by method and URI. Shows load on scan, batch-issue, and history endpoints.",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 10 },
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by(method, uri) (rate(http_server_requests_seconds_count{job=\"ticket-service\"}[5m]))",
              "legendFormat": "{{method}} {{uri}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "HTTP Latency Percentiles (P50 / P95 / P99)",
          "description": "Request latency percentiles for ticket-service. P99 spikes on /nearby or /batch indicate slow Feign chains or Cassandra writes.",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 10 },
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"ticket-service\"}[5m])))",
              "legendFormat": "P50 {{uri}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"ticket-service\"}[5m])))",
              "legendFormat": "P95 {{uri}}",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"ticket-service\"}[5m])))",
              "legendFormat": "P99 {{uri}}",
              "refId": "C"
            }
          ]
        },
        {
          "id": 6,
          "title": "JVM Heap Usage",
          "description": "JVM heap used vs max for ticket-service. Sustained growth approaching max heap indicates a Redis cache or Cassandra result-set memory leak.",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 10 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_used_bytes{job=\"ticket-service\", area=\"heap\"}",
              "legendFormat": "heap used",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_max_bytes{job=\"ticket-service\", area=\"heap\"}",
              "legendFormat": "heap max",
              "refId": "B"
            }
          ]
        }
      ]
    }

  # ── S5: Sales Service Dashboard (owned by S5-INFRA) ──
  sales-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["sales-service", "eventticketing"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Sales Service Dashboard",
      "uid": "sales-service-dashboard",
      "version": 1,
      "panels": [
        {
          "id": 1,
          "title": "Error Rate (errors per minute)",
          "description": "LogQL — ERROR-level log lines per minute from sales-service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"sales-service\", level=\"ERROR\"}[1m]))",
              "legendFormat": "errors/min",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Payment Saga Events",
          "description": "LogQL — payment.initiated / payment.completed / payment.failed / payment.refunded routing keys",
          "type": "logs",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{app=\"eventticketing\", service=\"sales-service\"} |~ \"payment\\.initiated|payment\\.completed|payment\\.failed|payment\\.refunded\"",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Feign Call Outcomes",
          "description": "LogQL — Feign calls to user-service / booking-service / event-service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"sales-service\"} |= \"returned successfully\" [5m]))",
              "legendFormat": "feign success",
              "refId": "A"
            },
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"sales-service\"} |= \"FeignException\" [5m]))",
              "legendFormat": "feign failures",
              "refId": "B"
            }
          ]
        },
        {
          "id": 4,
          "title": "HTTP Request Rate (req/s per endpoint)",
          "description": "PromQL — Requests per second grouped by URI",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by(method, uri) (rate(http_server_requests_seconds_count{job=\"sales-service\"}[5m]))",
              "legendFormat": "{{method}} {{uri}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "HTTP Latency Percentiles (P50 / P95 / P99)",
          "description": "PromQL — Latency percentiles per endpoint",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"sales-service\"}[5m])))",
              "legendFormat": "P50 {{uri}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"sales-service\"}[5m])))",
              "legendFormat": "P95 {{uri}}",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by(le, uri) (rate(http_server_requests_seconds_bucket{job=\"sales-service\"}[5m])))",
              "legendFormat": "P99 {{uri}}",
              "refId": "C"
            }
          ]
        },
        {
          "id": 6,
          "title": "JVM Heap Usage",
          "description": "PromQL — Heap used vs max",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_used_bytes{job=\"sales-service\", area=\"heap\"}",
              "legendFormat": "heap used",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_max_bytes{job=\"sales-service\", area=\"heap\"}",
              "legendFormat": "heap max",
              "refId": "B"
            }
          ]
        },
        {
          "id": 7,
          "title": "TicketSale Status Transitions",
          "description": "LogQL — PENDING → COMPLETED / FAILED / REFUNDED state changes",
          "type": "logs",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{app=\"eventticketing\", service=\"sales-service\"} |~ \"status=COMPLETED|status=FAILED|status=REFUNDED|status=PENDING\"",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Active TicketSales (PENDING count)",
          "description": "PromQL — Gauge of PENDING sales currently awaiting payment",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(http_server_requests_seconds_count{job=\"sales-service\", uri=~\"/api/sales/booking/.*\", status=\"201\"}[5m]))",
              "legendFormat": "new sales (5m)",
              "refId": "A"
            }
          ]
        }
      ]
    }