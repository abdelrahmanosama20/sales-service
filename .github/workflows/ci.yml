name: CI/CD - Build, Test, and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build all modules
        run: mvn -B clean install -DskipTests

      - name: Run sales-service tests
        run: mvn -B test -pl sales-service -am -Dtest="!SalesServiceApplicationTests,!SagaIntegrationTest,!SagaE2ETest" -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false

      - name: Build Docker image
        run: docker build -t sales-service:latest ./sales-service

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/deployments/sales-service-deployment.yaml
